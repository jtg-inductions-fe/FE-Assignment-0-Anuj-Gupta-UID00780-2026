<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Google Landing Page Recreation</title>
        <link rel="stylesheet" href="styles.css" />
    </head>

    <body>
        <div class="page">
            <header class="topbar">
                <nav class="topbar__nav topbar__nav--left" aria-label="Primary">
                    <a href="#">About</daa>
                    <a href="#" >Store</a>
                </nav>

                <nav
                    class="topbar__nav topbar__nav--right"
                    aria-label="Google services"
                >
                    <a href="#" >Gmail</a>
                    <a href="#" >Images</a>
                    <button
                        class="topbar__apps-button tooltip"
                        type="button"
                        aria-label="Open Google apps"
                        data-tooltip="Google apps"
                    >
                        <svg
                            aria-hidden="true"
                            focusable="false"
                            viewBox="0 0 24 24"
                            xmlns="http://www.w3.org/2000/svg"
                        >
                            <path
                                d="M5.5,16.5 C6.60457,16.5 7.5,17.3954 7.5,18.5 C7.5,19.6046 6.60457,20.5 5.5,20.5 C4.39543,20.5 3.5,19.6046 3.5,18.5 C3.5,17.3954 4.39543,16.5 5.5,16.5 Z M12,16.5 C13.1046,16.5 14,17.3954 14,18.5 C14,19.6046 13.1046,20.5 12,20.5 C10.8954,20.5 10,19.6046 10,18.5 C10,17.3954 10.8954,16.5 12,16.5 Z M18.5,16.5 C19.6046,16.5 20.5,17.3954 20.5,18.5 C20.5,19.6046 19.6046,20.5 18.5,20.5 C17.3954,20.5 16.5,19.6046 16.5,18.5 C16.5,17.3954 17.3954,16.5 18.5,16.5 Z M5.5,10 C6.60457,10 7.5,10.8954 7.5,12 C7.5,13.1046 6.60457,14 5.5,14 C4.39543,14 3.5,13.1046 3.5,12 C3.5,10.8954 4.39543,10 5.5,10 Z M12,10 C13.1046,10 14,10.8954 14,12 C14,13.1046 13.1046,14 12,14 C10.8954,14 10,13.1046 10,12 C10,10.8954 10.8954,10 12,10 Z M18.5,10 C19.6046,10 20.5,10.8954 20.5,12 C20.5,13.1046 19.6046,14 18.5,14 C17.3954,14 16.5,13.1046 16.5,12 C16.5,10.8954 17.3954,10 18.5,10 Z M5.5,3.5 C6.60457,3.5 7.5,4.39543 7.5,5.5 C7.5,6.60457 6.60457,7.5 5.5,7.5 C4.39543,7.5 3.5,6.60457 3.5,5.5 C3.5,4.39543 4.39543,3.5 5.5,3.5 Z M12,3.5 C13.1046,3.5 14,4.39543 14,5.5 C14,6.60457 13.1046,7.5 12,7.5 C10.8954,7.5 10,6.60457 10,5.5 C10,4.39543 10.8954,3.5 12,3.5 Z M18.5,3.5 C19.6046,3.5 20.5,4.39543 20.5,5.5 C20.5,6.60457 19.6046,7.5 18.5,7.5 C17.3954,7.5 16.5,6.60457 16.5,5.5 C16.5,4.39543 17.3954,3.5 18.5,3.5 Z"
                                fill="#09244B"
                            />
                        </svg>
                    </button>
                    <button class="topbar__signin-button" type="button">
                        Sign in
                    </button>
                </nav>
            </header>

            <main class="page__main">
                <section class="search" aria-labelledby="google-logo">
                    <div
                        id="google-logo"
                        class="search__logo"
                        aria-label="Google"
                    >
                        <img src="assets/google-logo.png" alt="" />
                    </div>

                    <form
                        class="search__form"
                        action="#"
                        autocomplete="off"
                        role="search"
                    >
                        <label class="visually-hidden" for="search-input"
                            >Search Google</label
                        >
                        <div class="search__box">
                            <button
                                class="search__add-button tooltip"
                                type="button"
                                aria-label="Add files"
                                data-tooltip="Add files"
                            >
                                <span aria-hidden="true">
                                    <svg fill="#000000" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" enable-background="new 0 0 52 52" xml:space="preserve">
<path d="M30,29h16.5c0.8,0,1.5-0.7,1.5-1.5v-3c0-0.8-0.7-1.5-1.5-1.5H30c-0.6,0-1-0.4-1-1V5.5C29,4.7,28.3,4,27.5,4
	h-3C23.7,4,23,4.7,23,5.5V22c0,0.6-0.4,1-1,1H5.5C4.7,23,4,23.7,4,24.5v3C4,28.3,4.7,29,5.5,29H22c0.6,0,1,0.4,1,1v16.5
	c0,0.8,0.7,1.5,1.5,1.5h3c0.8,0,1.5-0.7,1.5-1.5V30C29,29.4,29.4,29,30,29z"/>
</svg>
                                </span>
                            </button>
                            <input
                                id="search-input"
                                name="q"
                                type="search"
                                inputmode="search"
                            />
                            <button
                                class="search__voice-button tooltip"
                                type="button"
                                aria-label="Search by voice"
                                data-tooltip="Search by voice"
                            >
                                <svg
                                    aria-hidden="true"
                                    focusable="false"
                                    viewBox="0 0 24 24"
                                    fill="none"
                                    xmlns="http://www.w3.org/2000/svg"
                                >
                                    <path
                                        fill-rule="evenodd"
                                        clip-rule="evenodd"
                                        d="M12 2C9.769 2 8 3.757 8 5.828v6.344C8 14.242 9.769 16 12 16s4-1.758 4-3.828V5.828C16 3.758 14.231 2 12 2Z"
                                        fill="#000000"
                                    />
                                    <path
                                        d="M13 20.945V23a1 1 0 1 1-2 0v-2.055C6.5 20.448 3 16.633 3 12a1 1 0 1 1 2 0 7 7 0 1 0 14 0 1 1 0 1 1 2 0c0 4.633-3.5 8.448-8 8.945Z"
                                        fill="#000000"
                                    />
                                </svg>
                            </button>
                            <button
                                class="search__lens-button tooltip"
                                type="button"
                                aria-label="Search by image"
                                data-tooltip="Search by image"
                            >
                                <svg
                                    aria-hidden="true"
                                    focusable="false"
                                    width="24"
                                    height="24"
                                    viewBox="0 0 24 24"
                                    xmlns="http://www.w3.org/2000/svg"
                                >
                                    <path
                                        d="M12 16.667a4.666 4.666 0 100-9.333 4.666 4.666 0 000 9.333m8 6a2.666 2.666 0 100-5.333 2.666 2.666 0 000 5.333m-13.333-2a3.343 3.343 0 01-3.334-3.334v-2.666H0v2.666A6.665 6.665 0 006.667 24h2.666v-3.333zm-3.334-14c0-1.834 1.5-3.334 3.334-3.334h2.666V0H6.667A6.665 6.665 0 000 6.667v2.666h3.333zm14-3.334c1.834 0 3.334 1.5 3.334 3.334v2.666H24V6.667A6.665 6.665 0 0017.333 0h-2.666v3.333Z"
                                    />
                                </svg>
                            </button>
                            <button
                                class="search__ai-button tooltip"
                                type="button"
                                aria-label="AI Mode"
                                data-tooltip="AI Mode"
                            >
                                <span class="search__ai-icon" aria-hidden="true"
                                    >✦</span
                                >
                                <span>AI Mode</span>
                            </button>
                        </div>

                        <div class="search__actions">
                            <button type="submit">Google Search</button>
                            <button type="button" id="lucky-button">
                                I'm Feeling Lucky
                            </button>
                        </div>
                    </form>

                    <p class="search__languages">
                        Google offered in:
                        <a href="#" lang="hi" >हिन्दी</a>
                        <a href="#" lang="bn" >বাংলা</a>
                        <a href="#" lang="te" >తెలుగు</a>
                        <a href="#" lang="mr" >मराठी</a>
                        <a href="#" lang="ta" >தமிழ்</a>
                        <a href="#" lang="gu" >ગુજરાતી</a>
                        <a href="#" lang="kn" >ಕನ್ನಡ</a>
                        <a href="#" lang="ml" >മലയാളം</a>
                        <a href="#" lang="pa" >ਪੰਜਾਬੀ</a>
                    </p>
                </section>
            </main>

            <footer class="footer" aria-label="Footer">
                <div class="footer__region">India</div>
                <div class="footer__links">
                    <nav class="footer__group" aria-label="Company links">
                        <a href="#" >Advertising</a>
                        <a href="#" >Business</a>
                        <a href="#" >How Search works</a>
                    </nav>
                    <nav class="footer__group" aria-label="Policy links">
                        <a href="#" >Privacy</a>
                        <a href="#" >Terms</a>
                        <button class="footer__settings-button" type="button">
                            Settings
                        </button>
                    </nav>
                </div>
            </footer>
        </div>

        <script src="script.js"></script>
    </body>
</html>
